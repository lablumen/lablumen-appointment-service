name: release

# Create a GitHub Release (tag v1.2.0) on the commit already validated in DEV -> retag that exact ECR
# image to the semver and write it into lablumen-k8s values-prod.yaml -> ArgoCD deploys to PROD.
on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  promote:
    uses: lablumen/lablumen-shared/.github/workflows/service-release.yml@main
    with:
      service-name: appointment-service
      ecr-repository: lablumen/appointment-service
      role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/lablumen-app-ci-ecr
      release-tag: ${{ github.event.release.tag_name }}
    secrets:
      K8S_REPO_PAT: ${{ secrets.K8S_REPO_PAT }}
